name: Market Intelligence Engine

on:
  schedule:
    - cron: "*/30 * * * *" 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser yfinance requests pandas lxml supabase beautifulsoup4 textblob

      - name: Run Modular Intelligence Engine
        env:
          EMAIL_DATA: ${{ secrets.EMAIL_DATA }}
          SUPABASE_DATA: ${{ secrets.SUPABASE_DATA }}
        run: |
          python main.py
