name: Market Intelligence Engine

on:
  schedule:
    - cron: "*/30 * * * *" 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # STEP 1: Install muscle (Libraries)
      - name: Install Full Setup Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser yfinance requests pandas lxml

      # STEP 2: Run Brain (Python Script)
      - name: Run Modular Intelligence Engine
        run: |
          ls -R  # Verification check
          python main.py

      # STEP 3: Save Results (Git Push)
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update market discovery" && git pull --rebase origin main && git push)
