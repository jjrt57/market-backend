name: Market Intelligence Engine

on:
  schedule:
    # Run every 30 minutes to stay within NSE/Yahoo rate limits
    - cron: "*/30 * * * *" 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Full Setup Dependencies
        run: |
          python -m pip install --upgrade pip
          # Added pandas for NSE CSV parsing and lxml for faster yfinance
          pip install feedparser yfinance requests pandas lxml

      - name: Run Modular Intelligence Engine
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commits if there are changes; pull --rebase prevents 500/sync errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update market discovery" && git pull --rebase origin main && git push)