name: Market Intelligence Engine

on:
  schedule:
    - cron: "*/30 * * * *" 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # PRO UPGRADE 1: Action Caching (Saves 20 seconds per run)
      - name: Cache Pip Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Full Setup Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser yfinance requests pandas lxml

      # PRO UPGRADE 2: Inject Email Secrets into Python
      - name: Run Modular Intelligence Engine
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: |
          ls -R  # Verification check
          python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update market discovery" && git pull --rebase origin main && git push)
