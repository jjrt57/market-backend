# Manual Trigger Refresh
name: Market Hunter Bot Automation

on:
  push:
    branches: [ main ] 
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance supabase nsepython requests

      - name: Run Hunter Bot
        env:
          # Pulls your single JSON secret block
          SUPABASE_DATA: ${{ secrets.SUPABASE_DATA }}
        run: python hunter.py
