name: Market Hunter Bot Automation

on:
  schedule:
    # 9:00 AM IST is 3:30 AM UTC
    - cron: '30 3 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance supabase nsepython requests

      - name: Run Hunter Bot
        env:
          # You must add these to your GitHub Repo Settings > Secrets and Variables > Actions
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python hunter.py
